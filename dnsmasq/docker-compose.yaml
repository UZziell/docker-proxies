services:
  dnsmasq:
    image: dockurr/dnsmasq
    container_name: dnsmasq
    restart: always
    network_mode: host
    # ports:
    #   - 53:53/udp
    #   - 53:53/tcp
    cap_add:
      - NET_ADMIN
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "1"
