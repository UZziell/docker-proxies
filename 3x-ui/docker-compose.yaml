services:
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:${IMAGE_TAG:-v2.8.9}
    restart: unless-stopped
    volumes:
      - ./data/db-${NODE_NAME:-default}:/etc/x-ui/db
      - ../certbot/certbot-etc/:/etc/x-ui/certs
    environment:
      XUI_LOG_LEVEL: info
      XUI_DEBUG: "false"
      XUI_DB_FOLDER: /etc/x-ui/db
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
    logging:
      options:
        max-size: "50m"
        max-file: "1"
    network_mode: host
