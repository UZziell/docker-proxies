services:
  s-ui:
    image: ghcr.io/alireza0/s-ui:v1.3.7
    environment:
      - SUI_LOG_LEVEL=${SUI_LOG_LEVEL:-info}
      - SUI_DEBUG=${SUI_DEBUG:-false}
    volumes:
      - "./data/db-${NODE_NAME:-}:/app/db"
      - "../singbox/geodata:/app/geodata"
      - "../certbot/certbot-etc/:/app/cert"
    restart: unless-stopped
    network_mode: host
    # ports:
    #   - 80:80
    #   - 443:443
    #   - 2096:2096
    #   - 2095:2095
    logging:
      options:
        max-size: "50m"
        max-file: "1"
